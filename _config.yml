# Jupyter Book configuration
# https://jupyterbook.org/customize/config.html

title: "From Single Cell to Spatial Architecture"
author: "Jonathan E. Bard, PhD — UB Genomics & Bioinformatics Core"
logo: ""
copyright: "2026"
only_build_toc_files: true

execute:
  execute_notebooks: "off"   # read-along guide: outputs are pre-rendered, nothing runs at build

parse:
  myst_enable_extensions:
    - colon_fence
    - deflist
    - dollarmath
    - linkify

sphinx:
  extra_extensions:
    - sphinx_design
  config:
    html_show_copyright: true

repository:
  url: https://github.com/jebard/vasculata-workshop
  branch: main

html:
  use_issues_button: false
  use_repository_button: true
  home_page_in_navbar: true
